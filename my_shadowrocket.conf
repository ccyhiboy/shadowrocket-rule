# 我的自定义分流配置
# 通过 include 继承上游 lazy_group.conf，并追加香港券商分流规则
# 上游更新会自动同步；本文件内的规则优先级更高

[General]
include = https://raw.githubusercontent.com/LOWERTOP/Shadowrocket/refs/heads/main/lazy_group.conf

[Rule]
# 香港券商（富途/Moomoo、长桥、老虎、嘉信等），强制走香港节点，规避券商 IP 检测
RULE-SET,https://raw.githubusercontent.com/LingJingMaster/Shadowrocket-Rules/main/HK_Broker.list,香港节点
