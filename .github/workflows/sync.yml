name: Sync upstream Shadowrocket config

on:
  schedule:
    # 每天 UTC 20:00（北京时间次日 04:00）自动同步
    - cron: '0 20 * * *'
  workflow_dispatch: {}   # 支持在 Actions 页面手动点击运行

permissions:
  contents: write

# 防止多个同步任务同时运行导致互相冲突
concurrency:
  group: sync-config
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch upstream and inject custom rules
        run: |
          set -e
          UPSTREAM="https://raw.githubusercontent.com/LOWERTOP/Shadowrocket/refs/heads/main/lazy_group.conf"
          BROKER_LINE="RULE-SET,https://raw.githubusercontent.com/LingJingMaster/Shadowrocket-Rules/main/HK_Broker.list,香港节点"
          PV_LINE="RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/AmazonPrimeVideo/AmazonPrimeVideo.list,PrimeVideo"
          PV_GROUP="PrimeVideo = select,美国节点,PROXY,香港节点,台湾节点,日本节点,新加坡节点,韩国节点,policy-select-name=美国节点"

          # 下载上游最新配置
          curl -fsSL "$UPSTREAM" -o upstream.conf

          # 1) 修改已有策略组的默认线路：
          #    AI、谷歌服务 -> 美国节点；Netflix -> 香港节点
          sed -i \
            -e '/^AI = /s/policy-select-name=PROXY/policy-select-name=美国节点/' \
            -e '/^谷歌服务 = /s/policy-select-name=PROXY/policy-select-name=美国节点/' \
            -e '/^Amazon = /s/policy-select-name=PROXY/policy-select-name=美国节点/' \
            -e '/^Netflix = /s/policy-select-name=PROXY/policy-select-name=香港节点/' \
            upstream.conf

          # 2) 插入自定义规则和 Prime Video 策略组
          awk -v broker="$BROKER_LINE" -v pv="$PV_LINE" -v pvgroup="$PV_GROUP" '
            { print }
            # 在 [Proxy Group] 里的 游戏平台 组后面新增 Prime Video 组
            /^游戏平台 = / && !g {
              print pvgroup
              g=1
            }
            # 在 [Rule] 段顶部插入券商、Prime Video 规则（优先匹配）
            /^\[Rule\]/ && !r {
              print "# ==== 自定义：香港券商，走香港节点，规避 IP 检测 ===="
              print broker
              print "# ==== 自定义：Prime Video，默认走美国 ===="
              print pv
              print ""
              r=1
            }
          ' upstream.conf > my_shadowrocket.conf

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- my_shadowrocket.conf; then
            echo "No changes."
            exit 0
          fi

          git add my_shadowrocket.conf
          git commit -m "chore: sync upstream config $(date -u +%Y-%m-%d)"

          # 推送前先同步远端；若期间有新提交导致 rejected，则 rebase 后重试，最多 5 次
          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main && git push; then
              echo "pushed successfully"
              exit 0
            fi
            echo "attempt $i failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done

          echo "push failed after 5 attempts"
          exit 1
